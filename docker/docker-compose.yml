version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: racksephnox-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - racksephnox

  nginx:
    image: nginx:alpine
    container_name: racksephnox-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - racksephnox

  db:
    image: mysql:8.0
    container_name: racksephnox-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - racksephnox

  redis:
    image: redis:alpine
    container_name: racksephnox-redis
    restart: unless-stopped
    networks:
      - racksephnox

networks:
  racksephnox:
    driver: bridge

volumes:
  dbdata:
    driver: local
