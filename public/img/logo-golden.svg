<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFD700"/>
            <stop offset="50%" stop-color="#D4AF37"/>
            <stop offset="100%" stop-color="#B8860B"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <circle cx="25" cy="25" r="20" fill="url(#goldGrad)" filter="url(#glow)"/>
    <text x="25" y="33" text-anchor="middle" fill="#080810" font-size="18" font-weight="bold">∞</text>
    <text x="55" y="32" fill="url(#goldGrad)" font-size="20" font-weight="bold" filter="url(#glow)">Racksephnox</text>
    <text x="55" y="45" fill="#D4AF37" font-size="9">Divine Golden Spirit</text>
</svg>
