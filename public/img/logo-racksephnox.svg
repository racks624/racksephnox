<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="goldHoriz" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="30%" stop-color="#FFF5AA"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="goldenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="600" height="200" rx="20" ry="20" fill="#0a0a19"/>
  <g transform="translate(100, 100)" filter="url(#goldenGlow)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#goldHoriz)" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#goldHoriz)" stroke-width="1" opacity="0.3"/>
    <text x="0" y="15" text-anchor="middle" fill="url(#goldHoriz)" font-size="55" font-family="Georgia, serif" font-weight="bold">∞</text>
    <text x="0" y="38" text-anchor="middle" fill="#FFD700" font-size="14" font-family="Arial, sans-serif" font-weight="bold" opacity="0.8">₿</text>
  </g>
  <g transform="translate(220, 70)">
    <text x="0" y="0" fill="url(#goldHoriz)" font-size="48" font-family="Georgia, serif" font-weight="bold" letter-spacing="4">Racksephnox</text>
    <text x="0" y="30" fill="#D4AF37" font-size="14" font-family="Arial, sans-serif" letter-spacing="8" opacity="0.9">CRYPTOCURRENCY BITCOIN PLATFORM</text>
    <text x="0" y="55" fill="#B8860B" font-size="10" font-family="Arial, sans-serif" letter-spacing="4" opacity="0.7">⚡ INFINITE SPIRAL OF CREATION ⚡</text>
  </g>
</svg>
