<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldVert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="30" ry="30" fill="#0a0a19"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#goldVert)" stroke-width="2.5" opacity="0.6"/>
  <g transform="translate(100,100)" filter="url(#glow)">
    <text x="0" y="18" text-anchor="middle" fill="url(#goldVert)" font-size="65" font-family="Georgia, serif" font-weight="bold">∞</text>
    <text x="0" y="45" text-anchor="middle" fill="#FFD700" font-size="16" font-weight="bold">₿</text>
  </g>
  <text x="100" y="185" text-anchor="middle" fill="#D4AF37" font-size="11" font-family="Arial, sans-serif" letter-spacing="2">RACKSEPHNOX</text>
</svg>
